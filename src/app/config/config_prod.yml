app:
  name: "App API"
  version: "1.0.0"

security:
  jwt:
    secret_key: !ENV ${SECRET_KEY}
    algorithm: HS256
    access_token_expire_minutes: 15


persistence:
  driver: postgresql
  postgres:
    username: template-admin
    password: !ENV ${POSTGRES_PASSWORD}
    host: prod-host
    port: 5432
    dbname: template-db
    echo: false
    pool_size: 10
    max_overflow: 10
    pool_timeout: 30
    pool_pre_ping: true

logging:
  level: INFO
  format: json
  outputs:
  - type: console
  - type: file
    path: logs/app.log
    max_bytes: 52428800
    backup_count: 5
