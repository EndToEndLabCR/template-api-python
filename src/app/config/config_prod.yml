app:
  name: "App API"
  version: "1.0.0"

security:
  password_reset_token_expire_minutes: 1
  jwt:
    secret_key: !ENV ${SECRET_KEY}
    access_token_expire_minutes: 60

postgres:
  username: "templateAdmin"
  password: !ENV ${POSTGRES_PASSWORD}
  host: "prod-host"
  port: 5432
  dbname: "templatedb"
  echo: true  # SQLAlchemy echo logs
  pool_size: 10
  max_over_flow: 10
  pool_timeout: 30

persistence:
  driver: postgresql
  postgres:
    username: !ENV ${POSTGRES_USER:open-projects-hub-admin}
    password: !ENV ${POSTGRES_PASSWORD}
    host: !ENV ${POSTGRES_HOST}
    port: !ENV ${POSTGRES_PORT:5432}
    dbname: !ENV ${POSTGRES_DB:open-projects-hub-db}
    echo: false
    pool_size: 10
    max_overflow: 10
    pool_timeout: 30
    pool_pre_ping: true
