app:
  name: "App API"
  version: "1.0.0"

security:
  password_reset_token_expire_minutes: 1

postgres:
  username: "templateAdmin"
  password: !ENV ${POSTGRES_PASSWORD}
  host: "stage-host"
  port: 5432
  dbname: "templatedb"
  echo: true  # SQLAlchemy echo logs
  pool_size: 10
  max_over_flow: 10
  pool_timeout: 30

