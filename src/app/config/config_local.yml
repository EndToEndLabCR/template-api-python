app:
  name: "Orthopedic Spine API"
  version: "1.0.0"

postgres:
  username: "clinicAdmin"
  password: !ENV ${POSTGRES_PASSWORD}
  host: "localhost"
  port: 5432
  dbname: "clinicdb"
  echo: true  # SQLAlchemy echo logs
  poolSize: 10
  maxOverFlow: 10
  poolTimeout: 30

email:
  smtpServer: "smtp.gmail.com"
  smtpPort: 465
  address: "orthopedicspineinfo@gmail.com"
  password: !ENV ${EMAIL_PASSWORD}


authentication:
  secretKey: !ENV ${SECRET_KEY}
  algorithm: "HS256"
  access_token_expire_minutes: 30
  refresh_token_expire_days: 7

retry:
  read_operations:
    max_tries: 3
    backoff_factor: 1.5
    exceptions: ["SQLAlchemyError", "OperationalError", "TimeoutError"]
  write_operations:
    max_tries: 5
    backoff_factor: 2.0
    exceptions: ["SQLAlchemyError", "OperationalError", "IntegrityError"]
  critical_operations:
    max_tries: 7
    backoff_factor: 2.5
    exceptions: ["Exception"]
